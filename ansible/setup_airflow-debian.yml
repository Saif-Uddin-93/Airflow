- name: Setup Apache Airflow on Debian Trixie
  hosts: airflow_servers
  become: yes

  tasks:
    - name: Install system dependencies
      apt:
        update_cache: yes
        name: [python3.13, python3.13-venv, python3-pip, libpq-dev, postgresql, 
               postgresql-contrib, locales, acl, curl, python3-psycopg2, build-essential, 
               gcc, g++, libre2-dev, libabsl-dev]
        state: present

    - name: Ensure PostgreSQL is running
      service: { name: postgresql, state: started, enabled: yes }

    - name: Create the airflow_admin OS user
      user:
        name: "{{ airflow_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Create Airflow PostgreSQL user and databases
      become_user: postgres
      postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        role_attr_flags: NOSUPERUSER,CREATEDB

    - name: Create Airflow metadata database
      become_user: postgres
      postgresql_db:
        name: "{{ db_name }}"
        owner: "{{ db_user }}"

    - name: Create Mock source database
      become_user: postgres
      postgresql_db:
        name: "{{ mock_db_name }}"
        owner: "{{ db_user }}"

    - name: Download uv archive
      get_url:
        url: https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-unknown-linux-musl.tar.gz
        dest: /tmp/uv.tar.gz

    - name: Extract uv binary
      unarchive:
        src: /tmp/uv.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Move uv to /usr/bin
      copy:
        src: /tmp/uv-x86_64-unknown-linux-musl/uv
        dest: /usr/bin/uv
        mode: '0755'
        remote_src: yes

    - name: Create Virtual Environment with Python 3.13 using uv
      become_user: "{{ airflow_user }}"
      shell: "/usr/bin/uv venv {{ venv_path }} --python python3.13"
      args:
        creates: "{{ venv_path }}"

    - name: Install Airflow using uv
      become_user: "{{ airflow_user }}"
      shell: |
        source {{ venv_path }}/bin/activate
        uv pip install \
          "apache-airflow[postgres]=={{ airflow_version }}" \
          psycopg2-binary \
          legacy-cgi
      args:
        executable: /bin/bash

    - name: Configure environment variables in .bashrc
      become_user: "{{ airflow_user }}"
      blockinfile:
        path: "/home/{{ airflow_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK AIRFLOW"
        block: |
          export AIRFLOW_HOME={{ airflow_home }}
          export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN="postgresql+psycopg2://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name }}"

    - name: Initialize Airflow Database
      become_user: "{{ airflow_user }}"
      shell: |
        source {{ venv_path }}/bin/activate
        export AIRFLOW_HOME={{ airflow_home }}
        export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN="postgresql+psycopg2://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name }}"
        airflow db migrate
      args:
        executable: /bin/bash

    - name: Create Airflow Admin User
      become_user: "{{ airflow_user }}"
      shell: |
        source {{ venv_path }}/bin/activate
        export AIRFLOW_HOME={{ airflow_home }}
        export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN="postgresql+psycopg2://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name }}"
        airflow users create \
          --username {{ airflow_create_user }} \
          --firstname {{ airflow_create_first_name }} \
          --lastname {{ airflow_create_last_name }} \
          --role {{ airflow_create_role }} \
          --email {{ airflow_create_email }}\
          --password {{ airflow_create_password }}
      args:
        executable: /bin/bash
      register: user_create_output
      failed_when: "'already exists' not in user_create_output.stdout and user_create_output.rc != 0"
      changed_when: "'created' in user_create_output.stdout"

    - name: Populate Mock Source Data
      become_user: "{{ airflow_user }}"
      shell: |
        psql -d {{ mock_db_name }} -h localhost -U {{ db_user }} <<EOF
        CREATE TABLE IF NOT EXISTS source_orders (
            order_id INT PRIMARY KEY,
            customer_name VARCHAR(100),
            order_total NUMERIC,
            order_date DATE
        );
        INSERT INTO source_orders (order_id, customer_name, order_total, order_date) VALUES
        (1, 'Alice Smith', 150.00, '2026-04-10'),
        (2, 'Bob Jones', 85.50, '2026-04-11'),
        (3, 'Charlie Brown', 210.25, '2026-04-12')
        ON CONFLICT DO NOTHING;
        EOF
      environment:
        PGPASSWORD: "{{ db_password }}"

    - name: Create systemd service for Airflow Webserver
      copy:
        dest: /etc/systemd/system/airflow-webserver.service
        content: |
          [Unit]
          Description=Airflow webserver daemon
          After=network.target postgresql.service
          [Service]
          User={{ airflow_user }}
          Group={{ airflow_user }}
          Type=simple
          Environment="AIRFLOW_HOME={{ airflow_home }}"
          Environment="AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name }}"
          ExecStart={{ venv_path }}/bin/airflow webserver
          Restart=on-failure
          RestartSec=5s
          PrivateTmp=true
          [Install]
          WantedBy=multi-user.target

    - name: Create systemd service for Airflow Scheduler
      copy:
        dest: /etc/systemd/system/airflow-scheduler.service
        content: |
          [Unit]
          Description=Airflow scheduler daemon
          After=network.target postgresql.service
          [Service]
          User={{ airflow_user }}
          Group={{ airflow_user }}
          Type=simple
          Environment="AIRFLOW_HOME={{ airflow_home }}"
          Environment="AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name }}"
          ExecStart={{ venv_path }}/bin/airflow scheduler
          Restart=on-failure
          RestartSec=5s
          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd and enable Airflow services
      systemd:
        daemon_reload: yes
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - airflow-webserver
        - airflow-scheduler