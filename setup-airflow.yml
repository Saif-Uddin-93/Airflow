---
- name: Setup Apache Airflow on Debian
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache and install system dependencies
      apt:
        update_cache: yes
        name:
          - python3-venv
          - python3-pip
          - libpq-dev
          - postgresql
          - postgresql-contrib
          - acl
          - python3-psycopg2
        state: present

    - name: Create the airflow_admin OS user
      user:
        name: "{{ airflow_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Install community.postgresql collection dependencies
      apt:
        name: python3-psycopg2
        state: present
    - name: Ensure PostgreSQL is started and enabled
      service:
        name: postgresql
        state: started
        enabled: yes

    - name: Create Airflow PostgreSQL user
      become_user: postgres
      postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        role_attr_flags: NOSUPERUSER,CREATEDB

    - name: Create Airflow metadata database
      become_user: postgres
      postgresql_db:
        name: "{{ db_name }}"
        owner: "{{ db_user }}"

    - name: Create Mock source database
      become_user: postgres
      postgresql_db:
        name: "{{ mock_db_name }}"
        owner: "{{ db_user }}"

    - name: Create Airflow home directory
      file:
        path: "{{ airflow_home }}"
        state: directory
        owner: "{{ airflow_user }}"
        group: "{{ airflow_user }}"
        mode: '0755'

    - name: Create Python Virtual Environment
      become_user: "{{ airflow_user }}"
      command: "python3 -m venv {{ venv_path }}"
      args:
        creates: "{{ venv_path }}"

    - name: Install Airflow and Postgres Driver inside Venv
      become_user: "{{ airflow_user }}"
      pip:
        name:
          - "apache-airflow[postgres]=={{ airflow_version }}"
          - psycopg2-binary
        virtualenv: "{{ venv_path }}"
        extra_args: "--constraint https://raw.githubusercontent.com/apache/airflow/constraints-{{ airflow_version }}/constraints-{{ python_version }}.txt"

    - name: Configure environment variables in .bashrc
      become_user: "{{ airflow_user }}"
      blockinfile:
        path: "/home/{{ airflow_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK AIRFLOW"
        block: |
          export AIRFLOW_HOME={{ airflow_home }}
          export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN="postgresql+psycopg2://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name }}"

    - name: Initialize Airflow Database
      become_user: "{{ airflow_user }}"
      shell: |
        source {{ venv_path }}/bin/activate
        export AIRFLOW_HOME={{ airflow_home }}
        export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN="postgresql+psycopg2://{{ db_user }}:{{ db_password }}@localhost:5432/{{ db_name }}"
        airflow db migrate
      args:
        executable: /bin/bash

    - name: Create Airflow Admin User
      become_user: "{{ airflow_user }}"
      shell: |
        source {{ venv_path }}/bin/activate
        export AIRFLOW_HOME={{ airflow_home }}
        airflow users create \
          --username {{ airflow_create_user }} \
          --firstname {{ airflow_create_first_name }} \
          --lastname {{ airflow_create_last_name }} \
          --role {{ airflow_create_role }} \
          --email {{ airflow_create_email }}\
          --password {{ airflow_create_password }}
      args:
        executable: /bin/bash
      register: user_create_output
      failed_when: "'already exists' not in user_create_output.stdout and user_create_output.rc != 0"
      changed_when: "'created' in user_create_output.stdout"

    - name: Populate Mock Source Data
      become_user: "{{ airflow_user }}"
      shell: |
        psql -d {{ mock_db_name }} -h localhost -U {{ db_user }} <<EOF
        CREATE TABLE IF NOT EXISTS source_orders (
            order_id INT PRIMARY KEY,
            customer_name VARCHAR(100),
            order_total NUMERIC,
            order_date DATE
        );
        INSERT INTO source_orders (order_id, customer_name, order_total, order_date) VALUES
        (1, 'Alice Smith', 150.00, '2026-04-10'),
        (2, 'Bob Jones', 85.50, '2026-04-11'),
        (3, 'Charlie Brown', 210.25, '2026-04-12')
        ON CONFLICT DO NOTHING;
        EOF
      environment:
        PGPASSWORD: "{{ db_password }}"